name: 🩺 Linters
on: [pull_request]

jobs:
  eslint:
    name: ⚡ eslint
    runs-on: ubuntu-22.04
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: 🛠 Setup NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: 16
      - name: ⚙ Install dependencies
        run: npm ci
      - name: ⚡ Run ESLint
        run: npm run lint
  commitlint:
    name: 🧫 commitlint
    runs-on: ubuntu-22.04
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: 🧫 Run commitlint
        uses: wagoid/commitlint-github-action@v5
