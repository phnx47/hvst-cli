name: 💿 CI

on:
  push:
    branches:
      - "main"

jobs:
  build:
    name: 🏭 Build
    runs-on: ubuntu-22.04
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v3
      - name: 🐳 Build & Publish to CR
        uses: elgohr/Publish-Docker-Github-Action@v4
        with:
          name: phnx47/x-report
          username: ${{ secrets.GH_USERNAME }}
          password: ${{ secrets.GH_PKG_PAT }}
          registry: ghcr.io
